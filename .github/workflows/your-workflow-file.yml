name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v1
        with:
          java-version: '11'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload artifact
        uses: actions/upload-artifact@v4  # Updated from v3 to v4
        with:
          name: your-artifact-name





          name: your-artifact-name        with:        uses: actions/download-artifact@v4  # Updated from v3 to v4      - name: Download artifact          path: path/to/artifact