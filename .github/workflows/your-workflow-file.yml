name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Optional: If you need to build your site with a static site generator
      # - name: Build site
      #   run: |
      #     # Add build commands here if needed
      #     # For example: npm install && npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder containing your website files
          branch: gh-pages # The branch to deploy to
          clean: true # Automatically remove deleted files from the deployment

      # If you need to upload artifacts, use the latest version
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-files
          path: .
          retention-days: 5